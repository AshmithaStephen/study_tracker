<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Futuristic Study Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    color: white;
}

.container {
    width: 90%;
    max-width: 900px;
    margin: 30px auto;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* Dashboard Cards */
.dashboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 0 15px rgba(0,255,255,0.3);
}

.card h2 {
    margin: 0;
    font-size: 28px;
}

/* Input */
.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: cyan;
    cursor: pointer;
}

/* Task List */
ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: rgba(255,255,255,0.1);
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.actions button {
    margin-left: 5px;
    background: red;
}

.actions .done {
    background: limegreen;
}

/* Progress Bar */
.progress-bar {
    margin-top: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
}

.progress {
    height: 10px;
    background: cyan;
    width: 0%;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Study Dashboard</h1>

    <div class="dashboard">
        <div class="card">
            <p>Total Tasks</p>
            <h2 id="total">0</h2>
        </div>
        <div class="card">
            <p>Completed</p>
            <h2 id="completed">0</h2>
        </div>
        <div class="card">
            <p>Pending</p>
            <h2 id="pending">0</h2>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    let completed = 0;

    tasks.forEach((task, index) => {
        let li = document.createElement("li");

        if (task.done) {
            li.classList.add("completed");
            completed++;
        }

        li.innerHTML = `
            ${task.text}
            <div class="actions">
                <button class="done" onclick="toggleTask(${index})">✔</button>
                <button onclick="deleteTask(${index})">✖</button>
            </div>
        `;

        list.appendChild(li);
    });

    let total = tasks.length;
    let pending = total - completed;

    document.getElementById("total").textContent = total;
    document.getElementById("completed").textContent = completed;
    document.getElementById("pending").textContent = pending;

    let progress = total ? (completed / total) * 100 : 0;
    document.getElementById("progress").style.width = progress + "%";

    saveTasks();
}

function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value.trim();
    if (!text) return;

    tasks.push({ text, done: false });
    input.value = "";
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    renderTasks();
}

function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    renderTasks();
}

renderTasks();
</script>

</body>
</html>
